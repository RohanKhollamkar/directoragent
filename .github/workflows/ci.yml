name: ci

# The deterministic backbone. Runs on every push and PR. Cannot be argued
# with — if this is red, the code is not safe to merge, regardless of what
# any review says. Mock mode means this needs NO credentials and NO torch.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Light install: core deps + dev tools, NO torch/open-clip.
      # This works because mock mode never imports CLIP, and the package
      # lazy-loads torch. See the dependency-split note in VERIFICATION.md.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Tests (includes invariant gates)
        run: python -m pytest -q

      # Working-state proof: the whole pipeline must run end to end in mock mode.
      # Guarded so it skips cleanly until the da CLI (cli.py, STEP 10) exists.
      # pip generates the `da` wrapper from the entry point even before cli.py
      # is written, so gate on the source file too — not just `command -v da`.
      - name: Mock pipeline smoke
        run: |
          if [ -f src/directoragent/cli.py ] && command -v da >/dev/null 2>&1; then
            mkdir -p assets
            # 1x1 PNG so the CLI has a real file path; MockVisionProvider ignores contents.
            python -c "import base64, pathlib; pathlib.Path('assets/test.png').write_bytes(base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=='))"
            da run assets/test.png "ci smoke run" --mock --max-cost 50 --run-id ci-smoke
            test -f .directoragent/runs/ci-smoke/storyboard.json
          else
            echo "da CLI not built yet (src/directoragent/cli.py absent); skipping mock pipeline smoke"
          fi

      # Resume must be a no-op on an already-complete run (no new attempts).
      # Same guard: only meaningful once the CLI exists and the smoke run above ran.
      - name: Mock resume is idempotent
        run: |
          if [ -f src/directoragent/cli.py ] && command -v da >/dev/null 2>&1; then
            da resume ci-smoke --mock
          else
            echo "da CLI not built yet (src/directoragent/cli.py absent); skipping mock resume"
          fi
